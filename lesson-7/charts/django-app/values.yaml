image:
  repository: 526295688578.dkr.ecr.eu-west-1.amazonaws.com/lesson-7-ecr
  tag: "latest"
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 8000

ingress:
  enabled: false

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

config:
  POSTGRES_HOST: "django-app-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "django_user"
  POSTGRES_DB: "django_db"
  POSTGRES_PASSWORD: "Pass%12345678%"
  ALLOWED_HOSTS: "*"