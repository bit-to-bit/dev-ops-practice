version: '3.9'

services:
  django:
    build:
      context: ./app 
    container_name: django_events_app
    volumes:
      - ./app:/app
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      - db

  db:
    image: postgres:17.7-alpine3.23
    container_name: postgres_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.29-alpine-slim
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - django

volumes:
  postgres_data:
